<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="description" content="NotesMind — A private, local-first RAG chatbot that answers questions exclusively from your uploaded notes. Zero cost, zero server, complete privacy." />
  <meta name="keywords" content="RAG chatbot, AI notes, private AI, local LLM, document QA" />
  <meta name="author" content="NotesMind" />
  <meta property="og:title" content="NotesMind — Chat with Your Notes" />
  <meta property="og:description" content="Private, local-first RAG chatbot for your documents. Zero cost, zero server." />
  <meta property="og:type" content="website" />
  <meta name="theme-color" content="#6366F1" />

  <title>NotesMind — Chat with Your Notes</title>

  <!-- PWA -->
  <link rel="manifest" href="/manifest.webmanifest" />
  <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 32 32'><rect width='32' height='32' rx='8' fill='%236366F1'/><text x='50%' y='50%' font-size='18' font-family='sans-serif' font-weight='bold' fill='white' text-anchor='middle' dominant-baseline='central'>N</text></svg>" />

  <!-- Styles -->
  <link rel="stylesheet" href="styles/tokens.css" />
  <link rel="stylesheet" href="styles/base.css" />
  <link rel="stylesheet" href="styles/layout.css" />
  <link rel="stylesheet" href="styles/components/button.css" />
  <link rel="stylesheet" href="styles/components/card.css" />
  <link rel="stylesheet" href="styles/components/chat-bubble.css" />
  <link rel="stylesheet" href="styles/components/dialog.css" />
  <link rel="stylesheet" href="styles/components/toast.css" />
  <link rel="stylesheet" href="styles/components/dropzone.css" />
  <link rel="stylesheet" href="styles/components/badge.css" />
  <link rel="stylesheet" href="styles/components/table.css" />
  <link rel="stylesheet" href="styles/pages/landing.css" />
  <link rel="stylesheet" href="styles/pages/dashboard.css" />
  <link rel="stylesheet" href="styles/pages/chat.css" />
  <link rel="stylesheet" href="styles/pages/settings.css" />
  <link rel="stylesheet" href="styles/pages/kb-manager.css" />
  <link rel="stylesheet" href="styles/pages/about.css" />

  <!-- highlight.js theme (GitHub Dark) -->
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/highlight.js@11.9.0/styles/github-dark.min.css" id="hljs-theme" />
</head>
<body>
  <!-- App mount point -->
  <div id="app">
    <!-- Nav rail -->
    <nav id="nav-rail" class="nav-rail" role="navigation" aria-label="Main navigation">
      <div class="nav-rail-header">
        <a href="/" class="nav-logo" id="logo-link" aria-label="NotesMind Home">
          <div class="logo-icon" aria-hidden="true">N</div>
          <span class="nav-logo-text">NotesMind</span>
        </a>
        <button class="btn btn-ghost btn-icon" id="rail-collapse-btn" aria-label="Collapse navigation" title="Collapse">
          <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><path d="m15 18-6-6 6-6"/></svg>
        </button>
      </div>

      <!-- KB switcher -->
      <div class="nav-kb-section" id="nav-kb-section">
        <div class="nav-kb-label nav-label">Knowledge Base</div>
        <select id="nav-kb-select" class="nav-kb-select" aria-label="Select Knowledge Base"
          style="width:100%;padding:6px 8px;border-radius:var(--radius-md);background:var(--bg-surface-raised);border:1px solid var(--border-subtle);color:var(--text-primary);font-size:var(--text-xs);font-family:inherit;cursor:pointer;outline:none;">
          <option value="">— Select KB —</option>
        </select>
      </div>

      <div class="nav-body" role="list">
        <button class="nav-link" data-route="/" role="listitem" aria-label="Dashboard">
          <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><rect width="7" height="9" x="3" y="3" rx="1"/><rect width="7" height="5" x="14" y="3" rx="1"/><rect width="7" height="9" x="14" y="12" rx="1"/><rect width="7" height="5" x="3" y="16" rx="1"/></svg>
          <span class="nav-label">Dashboard</span>
        </button>
        <button class="nav-link" data-route="/chat" role="listitem" aria-label="Chat">
          <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"/></svg>
          <span class="nav-label">Chat</span>
        </button>
        <button class="nav-link" data-route="/upload" role="listitem" aria-label="Upload">
          <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="17 8 12 3 7 8"/><line x1="12" x2="12" y1="3" y2="15"/></svg>
          <span class="nav-label">Upload</span>
        </button>
        <button class="nav-link" data-route="/kb" role="listitem" aria-label="Knowledge Base">
          <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><path d="M4 19.5v-15A2.5 2.5 0 0 1 6.5 2H20v20H6.5a2.5 2.5 0 0 1 0-5H20"/></svg>
          <span class="nav-label">Knowledge Base</span>
        </button>
      </div>

      <div class="nav-footer">
        <button class="nav-link" data-route="/settings" role="listitem" aria-label="Settings" id="settings-nav-btn">
          <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><path d="M12.22 2h-.44a2 2 0 0 0-2 2v.18a2 2 0 0 1-1 1.73l-.43.25a2 2 0 0 1-2 0l-.15-.08a2 2 0 0 0-2.73.73l-.22.38a2 2 0 0 0 .73 2.73l.15.1a2 2 0 0 1 1 1.72v.51a2 2 0 0 1-1 1.74l-.15.09a2 2 0 0 0-.73 2.73l.22.38a2 2 0 0 0 2.73.73l.15-.08a2 2 0 0 1 2 0l.43.25a2 2 0 0 1 1 1.73V20a2 2 0 0 0 2 2h.44a2 2 0 0 0 2-2v-.18a2 2 0 0 1 1-1.73l.43-.25a2 2 0 0 1 2 0l.15.08a2 2 0 0 0 2.73-.73l.22-.39a2 2 0 0 0-.73-2.73l-.15-.08a2 2 0 0 1-1-1.74v-.5a2 2 0 0 1 1-1.74l.15-.09a2 2 0 0 0 .73-2.73l-.22-.38a2 2 0 0 0-2.73-.73l-.15.08a2 2 0 0 1-2 0l-.43-.25a2 2 0 0 1-1-1.73V4a2 2 0 0 0-2-2z"/><circle cx="12" cy="12" r="3"/></svg>
          <span class="nav-label">Settings</span>
        </button>
        <button class="nav-link" data-route="/about" role="listitem" aria-label="About">
          <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><circle cx="12" cy="12" r="10"/><path d="M12 16v-4"/><path d="M12 8h.01"/></svg>
          <span class="nav-label">About</span>
        </button>

        <!-- Theme toggle -->
        <button class="nav-link" id="theme-toggle-btn" aria-label="Toggle theme">
          <svg id="theme-icon-dark" xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><path d="M12 3a6 6 0 0 0 9 9 9 9 0 1 1-9-9Z"/></svg>
          <svg id="theme-icon-light" xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true" style="display:none"><circle cx="12" cy="12" r="4"/><path d="M12 2v2"/><path d="M12 20v2"/><path d="m4.93 4.93 1.41 1.41"/><path d="m17.66 17.66 1.41 1.41"/><path d="M2 12h2"/><path d="M20 12h2"/><path d="m6.34 17.66-1.41 1.41"/><path d="m19.07 4.93-1.41 1.41"/></svg>
          <span class="nav-label" id="theme-label">Light mode</span>
        </button>
      </div>
    </nav>

    <!-- Nav overlay for mobile -->
    <div class="nav-overlay" id="nav-overlay" role="presentation" aria-hidden="true"></div>

    <!-- Main content -->
    <main class="main-content" id="main-content" role="main">
      <!-- Top bar -->
      <header class="topbar" id="topbar">
        <div class="topbar-left">
          <!-- Mobile hamburger -->
          <button class="btn btn-ghost btn-icon" id="mobile-menu-btn" aria-label="Open navigation menu" style="display:none">
            <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><line x1="4" x2="20" y1="12" y2="12"/><line x1="4" x2="20" y1="6" y2="6"/><line x1="4" x2="20" y1="18" y2="18"/></svg>
          </button>
          <span id="topbar-title" style="font-size:var(--text-base);font-weight:var(--weight-semi);color:var(--text-primary);">Dashboard</span>
        </div>
        <div class="topbar-right">
          <!-- Search trigger (Ctrl+K) -->
          <button class="btn btn-secondary btn-sm" id="search-btn" aria-label="Search (Ctrl+K)" title="Search (Ctrl+K)" style="gap:var(--space-2)">
            <svg xmlns="http://www.w3.org/2000/svg" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><circle cx="11" cy="11" r="8"/><path d="m21 21-4.3-4.3"/></svg>
            <span>Search</span>
            <kbd class="kbd" style="font-size:10px;">⌘K</kbd>
          </button>
        </div>
      </header>

      <!-- Page view container -->
      <div id="view-container" aria-live="polite" aria-atomic="false">
        <!-- Page content mounted here by router -->
        <div style="display:flex;align-items:center;justify-content:center;height:60vh;color:var(--text-secondary);">
          <div style="text-align:center">
            <div style="font-size:var(--text-2xl);margin-bottom:8px;">⚡</div>
            <div>Loading NotesMind…</div>
          </div>
        </div>
      </div>
    </main>
  </div>

  <!-- Mobile bottom nav -->
  <nav class="mobile-nav" id="mobile-nav" role="navigation" aria-label="Mobile navigation">
    <div class="mobile-nav-items">
      <button class="mobile-nav-item" data-route="/" aria-label="Dashboard">
        <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><rect width="7" height="9" x="3" y="3" rx="1"/><rect width="7" height="5" x="14" y="3" rx="1"/><rect width="7" height="9" x="14" y="12" rx="1"/><rect width="7" height="5" x="3" y="16" rx="1"/></svg>
        <span>Home</span>
      </button>
      <button class="mobile-nav-item" data-route="/chat" aria-label="Chat">
        <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"/></svg>
        <span>Chat</span>
      </button>
      <button class="mobile-nav-item" data-route="/upload" aria-label="Upload">
        <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="17 8 12 3 7 8"/><line x1="12" x2="12" y1="3" y2="15"/></svg>
        <span>Upload</span>
      </button>
      <button class="mobile-nav-item" data-route="/kb" aria-label="Library">
        <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><path d="M4 19.5v-15A2.5 2.5 0 0 1 6.5 2H20v20H6.5a2.5 2.5 0 0 1 0-5H20"/></svg>
        <span>Library</span>
      </button>
      <button class="mobile-nav-item" data-route="/settings" aria-label="Settings">
        <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><path d="M12.22 2h-.44a2 2 0 0 0-2 2v.18a2 2 0 0 1-1 1.73l-.43.25a2 2 0 0 1-2 0l-.15-.08a2 2 0 0 0-2.73.73l-.22.38a2 2 0 0 0 .73 2.73l.15.1a2 2 0 0 1 1 1.72v.51a2 2 0 0 1-1 1.74l-.15.09a2 2 0 0 0-.73 2.73l.22.38a2 2 0 0 0 2.73.73l.15-.08a2 2 0 0 1 2 0l.43.25a2 2 0 0 1 1 1.73V20a2 2 0 0 0 2 2h.44a2 2 0 0 0 2-2v-.18a2 2 0 0 1 1-1.73l.43-.25a2 2 0 0 1 2 0l.15.08a2 2 0 0 0 2.73-.73l.22-.39a2 2 0 0 0-.73-2.73l-.15-.08a2 2 0 0 1-1-1.74v-.5a2 2 0 0 1 1-1.74l.15-.09a2 2 0 0 0 .73-2.73l-.22-.38a2 2 0 0 0-2.73-.73l-.15.08a2 2 0 0 1-2 0l-.43-.25a2 2 0 0 1-1-1.73V4a2 2 0 0 0-2-2z"/><circle cx="12" cy="12" r="3"/></svg>
        <span>Settings</span>
      </button>
    </div>
  </nav>

  <!-- Toast container -->
  <div id="toast-container" class="toast-container" role="status" aria-live="polite" aria-atomic="false"></div>

  <!-- Command palette dialog -->
  <dialog id="command-palette-dialog" class="command-palette" aria-label="Command palette" aria-modal="true">
    <div class="cmd-search-wrapper">
      <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round" style="color:var(--text-secondary);flex-shrink:0" aria-hidden="true"><circle cx="11" cy="11" r="8"/><path d="m21 21-4.3-4.3"/></svg>
      <input class="cmd-search-input" id="cmd-search-input" type="search" placeholder="Search chats, documents, commands…" autocomplete="off" aria-label="Search" />
      <div class="cmd-kbd"><kbd class="kbd">Esc</kbd></div>
    </div>
    <div class="cmd-results" id="cmd-results" role="listbox" aria-label="Search results"></div>
  </dialog>

  <!-- Confirm dialog (reusable) -->
  <dialog id="confirm-dialog" aria-modal="true">
    <div class="dialog-header">
      <h2 class="dialog-title" id="confirm-title">Are you sure?</h2>
      <button class="dialog-close" id="confirm-close-btn" aria-label="Close dialog">
        <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><path d="M18 6 6 18"/><path d="m6 6 12 12"/></svg>
      </button>
    </div>
    <div class="dialog-body" id="confirm-body"></div>
    <div class="dialog-footer">
      <button class="btn btn-secondary" id="confirm-cancel-btn">Cancel</button>
      <button class="btn btn-danger" id="confirm-ok-btn">Confirm</button>
    </div>
  </dialog>

  <!-- App bootstrap -->
  <script type="module" src="src/main.js"></script>
</body>
</html>
